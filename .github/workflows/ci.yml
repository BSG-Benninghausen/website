name: Tests

# Führt bei jedem PR und bei Pushes auf main die Test-Suiten aus:
#   • contract – die zero-dependency Contract-Tests im MOCK-Modus, plus Syntax-Check,
#                Versions-Guard und Seed-Vendoring-Check (Cache-Busting/Seeds konsistent).
#                Seit dem Phase-3-Split (docs/backend-repo-separation-plan.md) liegt das echte
#                Backend in einem eigenen Repo; der Real-Modus-/Persistenz-Test läuft dort in
#                dessen eigener CI. Hier bleibt der Mock-Vertrag der Gegenstand.
#   • e2e      – Browser-End-to-End-Tests (Playwright, isoliert in tests/e2e/). Bootet das
#                gepinnte Backend (backend-ref.json) same-origin gegen den Frontend-Root.
#                Da das Backend-Repo privat ist, ist der Job auf das Secret BACKEND_REPO_TOKEN
#                angewiesen; ohne Token wird er (grün) übersprungen.
# Der Deploy nach GitHub Pages bleibt davon getrennt (siehe deploy-pages.yml).
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: Contract-Tests (Mock) & Guards
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22   # Harness nutzt Headers.getSetCookie() -> Node >= 20

      - name: Syntax-Check (node --check)
        run: |
          set -e
          for f in assets/js/*.js packages/api-contract/*.mjs tools/*.mjs tests/e2e/*.mjs service-worker.js; do
            echo "check $f"
            node --check "$f"
          done

      - name: Mergeback-Tools · Self-Test (classify-diff / detect-contract-change)
        run: node --test tools/classify-diff.test.mjs tools/detect-contract-change.test.mjs tools/prerender-branding.test.mjs

      - name: Versions-Guard (Cache-Busting)
        run: node tools/guard-versions.mjs

      - name: Seeds vendored == kanonisch (assets/data == @crypticalcode/api-contract/data)
        run: node tools/vendor-seeds.mjs --check

      - name: Branding gestempelt == club.bsg.json (Precompile-Konsistenz)
        run: node tools/prerender-branding.mjs --check

      - name: Contract-Package paketierbar (files/exports)
        run: npm pack --dry-run -w packages/api-contract

      - name: Mock-Modus
        run: node packages/api-contract/run.mjs

  e2e:
    name: Browser-E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Backend-Zugriff prüfen (privates Backend-Repo -> Token nötig)
        id: gate
        env:
          TOKEN: ${{ secrets.BACKEND_REPO_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::BACKEND_REPO_TOKEN nicht gesetzt – Browser-E2E übersprungen. Das echte Backend liegt seit dem Phase-3-Split im privaten Repo (siehe backend-ref.json); ein Read-Token aktiviert die E2E."
          fi

      - name: Frontend auschecken
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4

      - name: Gepinnten Backend-Ref lesen (backend-ref.json)
        if: steps.gate.outputs.ok == 'true'
        id: ref
        run: |
          echo "repo=$(node -p "require('./backend-ref.json').repo")" >> "$GITHUB_OUTPUT"
          echo "sha=$(node -p "require('./backend-ref.json').ref")" >> "$GITHUB_OUTPUT"

      - name: Backend auschecken (gepinnt)
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.ref.outputs.repo }}
          ref: ${{ steps.ref.outputs.sha }}
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: backend

      - name: Node einrichten
        if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: E2E-Abhängigkeiten installieren
        if: steps.gate.outputs.ok == 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Playwright-Browser installieren
        if: steps.gate.outputs.ok == 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: E2E-Tests (Playwright bootet das gepinnte Backend, BSG_STATIC_DIR=Frontend-Root)
        if: steps.gate.outputs.ok == 'true'
        working-directory: tests/e2e
        env:
          BSG_BACKEND_DIR: ${{ github.workspace }}/backend
        run: npx playwright test

      - name: Playwright-Report hochladen
        if: ${{ steps.gate.outputs.ok == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
