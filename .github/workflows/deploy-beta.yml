name: Deploy Beta (Hetzner)

# Beta-Stufe: ausgelöst durch Beta-Tags (z. B. v0.1.0-beta.1) oder manuell.
# Voraussetzung: Environment "beta" mit Secrets (siehe deploy/README.md).
on:
  push:
    tags:
      - "v*.*.*-beta.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-beta
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: beta
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- Qualitäts-Gate (gleiches wie CI) ---
      - name: Syntax-Check
        run: for f in assets/js/*.js server/*.mjs tests/*.mjs service-worker.js; do node --check "$f"; done

      - name: Versions-Guard
        run: node tests/guard-versions.mjs

      - name: Contract-Tests · Mock
        run: node tests/run.mjs

      - name: Contract-Tests · echtes Backend
        run: |
          BSG_DEV=1 node server/index.mjs & echo $! > /tmp/srv.pid
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/news >/dev/null 2>&1 && break; sleep 0.5; done
          TEST_BASE=http://localhost:3000 node tests/run.mjs
          kill "$(cat /tmp/srv.pid)" 2>/dev/null || true

      # --- Deploy ---
      - name: API-Default auf "real" setzen (same-origin)
        run: |
          sed -i 's/mode: "mock",/mode: "real",/' assets/js/api-config.js

      - name: SSH-Key bereitstellen
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Dateien synchronisieren (rsync)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_deploy" \
            ./ "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ secrets.BETA_PATH }}/"

      - name: Dienst neu starten
        run: ssh -i ~/.ssh/id_deploy "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "sudo systemctl restart bsg-beta"

      - name: Smoke-Test (authentifiziert)
        run: |
          set -e
          BASE="${{ secrets.BETA_URL }}"
          AUTH="${{ secrets.BETA_BASICAUTH }}"
          for path in / /api/news /api/team /api/site; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -u "$AUTH" "$BASE$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || { echo "Smoke fehlgeschlagen für $path"; exit 1; }
          done
