name: Lint

# Statische Qualitäts- und Sicherheitschecks, ergänzend zu ci.yml (Tests).
#   • actionlint – Actions-YAML-Lint. BLOCKIEREND (läuft sauber).
#   • zizmor     – Actions-Security-Audit (pull_request_target/Token/Bot-Muster).
#                  ADVISORY, bis die Bestands-Workflows gehärtet sind (u. a. Actions
#                  auf Commit-SHA pinnen) — siehe Folge-PR.
#   • code/style – ESLint, Stylelint, markdownlint, typos, Link-Check. ADVISORY
#                  (Step-Level continue-on-error -> Checks bleiben grün), damit die
#                  bestehende grüne CI nicht bricht; nach Cleanup auf required heben.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Workflow-Lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error

  zizmor:
    name: Actions-Security (zizmor, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: zizmor
        continue-on-error: true
        uses: zizmorcore/zizmor-action@v0.1.2
        with:
          advanced-security: false
          persona: regular

  eslint:
    name: ESLint (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: ESLint über die Site-Logik
        continue-on-error: true
        run: npx --yes eslint@^9 "assets/js/**/*.js" "packages/**/*.mjs" "tools/**/*.mjs"

  stylelint:
    name: Stylelint (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stylelint über die CSS-Dateien
        continue-on-error: true
        run: npx --yes stylelint@^16 "assets/css/**/*.css"

  markdown:
    name: markdownlint (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: markdownlint
        continue-on-error: true
        run: npx --yes markdownlint-cli2@^0.14 "**/*.md" "!**/node_modules/**"

  spelling:
    name: Rechtschreibung – typos (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: typos
        continue-on-error: true
        uses: crate-ci/typos@v1.24.6

  links:
    name: Link-Check – lychee (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lychee
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 4 "**/*.md" "**/*.html"
          fail: true
