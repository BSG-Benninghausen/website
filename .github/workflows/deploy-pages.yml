name: Deploy zu GitHub Pages

# Baut die Astro-Seite (astro-poc/) und veröffentlicht das statische dist/ auf
# GitHub Pages (API-Modus "mock"). Läuft beim Push auf main.
#
# Das Astro-Gerüst (astro-poc/) ist geteilt/branding-neutral und kommt per
# `git merge upstream/main` aus dem Hauptrepo. WELCHER Verein gebaut wird, kommt
# aus der Repo-Variable `vars.BSG_CLUB_ID` (hier Fallback "bsg"): active-club.mjs
# liest daraus assets/data/club.<id>.json (Single Source of Truth). Branding/Seeds
# liegen unter assets/ und werden per `npm run sync-assets` in den Build kopiert.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22   # Astro 6 verlangt Node >= 22.12.0

      - name: GitHub Pages konfigurieren (aktiviert Pages bei Bedarf)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Astro bauen (aktiver Verein aus vars.BSG_CLUB_ID, Fallback bsg)
        env:
          BSG_CLUB_ID: ${{ vars.BSG_CLUB_ID || 'bsg' }}
        run: |
          cd astro-poc
          npm ci
          npm run build

      - name: dist als Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: "astro-poc/dist"

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
