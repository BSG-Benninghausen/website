name: Deploy zu GitHub Pages

# Baut die Astro-Seite (astro-poc/) und veröffentlicht das statische dist/ auf
# GitHub Pages (API-Modus "mock"). Läuft beim Push auf main. Branding kommt zur
# Build-Zeit aus assets/data/club.bsg.json; die Seiten-Assets/JS liegen weiter
# unter assets/ (Single Source of Truth) und werden in den Build kopiert.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Rechte, die der Deploy benötigt
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22   # Astro 6 verlangt Node >= 22.12.0

      - name: GitHub Pages konfigurieren (aktiviert Pages bei Bedarf)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Astro bauen (Branding aus club.bsg.json, Assets aus ../assets)
        run: |
          cd astro-poc
          npm ci
          npm run build

      - name: dist als Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: "astro-poc/dist"

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
